<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>ココフォリアログ編集ツール</title>
<link rel="icon" href="C.png" />
<link rel="apple-touch-icon" href="C.png" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="app-header">
  <h1>ココフォリアログ編集ツール</h1>
</header>

<button type="button" class="app-header__menu-btn" id="btn-sidebar-open" hidden aria-label="ツールメニューを開く">
  ☰
  <span class="app-header__menu-badge" id="sidebar-filter-dot" hidden></span>
</button>

<div class="layout">

  <div class="sidebar-backdrop" id="sidebar-backdrop" hidden></div>
  <aside class="sidebar" id="sidebar" hidden>
    <div class="sidebar__header">
      <span class="sidebar__title">ツール</span>
      <button type="button" class="bottom-bar__icon-btn" id="btn-sidebar-close" aria-label="メニューを閉じる">×</button>
    </div>

    <button type="button" class="btn btn--primary btn--block sidebar__first-btn" id="btn-save-temp">一時保存（HTML）</button>

    <div class="sidebar__section">
      <h3 class="sidebar__section-title">書き出す</h3>
      <label class="field filter-field">
        <span class="field__label">書き出し形式</span>
        <select id="export-format-select">
          <option value="markdown">Markdown（Notion向け）</option>
          <option value="text">テキスト（.txt）</option>
        </select>
      </label>
      <button type="button" class="btn btn--secondary btn--block" id="btn-copy-export">コピー</button>
      <button type="button" class="btn btn--primary btn--block" id="btn-download-export">ダウンロード</button>
      <p class="export-status" id="export-status"></p>
    </div>

    <div class="sidebar__section">
      <h3 class="sidebar__section-title">その他の操作</h3>
      <button type="button" class="btn btn--secondary btn--block" id="btn-manage-speaker-colors">発言者の色を管理する</button>
      <button type="button" class="btn btn--danger btn--block" id="btn-delete-empty">本文が空の発言をまとめて削除</button>
    </div>

    <div class="sidebar__section">
      <h3 class="sidebar__section-title">絞り込み</h3>
      <p class="sidebar__section-desc" id="filter-summary">すべて表示中</p>
      <label class="field filter-field">
        <span class="field__label">発言者で絞り込む</span>
        <select id="speaker-filter-select">
          <option value="all">すべての発言者</option>
        </select>
      </label>

      <label class="field filter-field">
        <span class="field__label">表示するダイスロール判定</span>
        <select id="filter-select">
          <option value="all">すべて表示</option>
          <option value="dice">ダイスロールのみ</option>
          <option value="dice-success">ダイスロール：成功系のみ（クリティカル/イクストリーム成功/ハード成功/レギュラー成功/成功）</option>
          <option value="dice-failure">ダイスロール：失敗系のみ（失敗/ファンブル）</option>
          <option value="talk">ダイスロール以外（会話のみ）</option>
        </select>
      </label>
    </div>
  </aside>

  <main>

    <!-- 読み込みエリア -->
    <section class="panel" id="section-load">
      <div id="load-full">
        <h2 class="panel__title">ログを読み込む</h2>
        <p class="panel__desc">ココフォリアから書き出したHTML、または本ツールで一時保存したHTMLを選んでください。</p>
        <label class="btn btn--primary btn--block" for="file-input">ファイルを選ぶ</label>
        <input type="file" id="file-input" accept=".html,text/html" hidden />
        <p class="load-status" id="load-status">まだファイルが読み込まれていません。</p>
      </div>
      <div id="load-collapsed" class="load-collapsed" hidden>
        <span class="load-collapsed__text" id="load-collapsed-text"></span>
        <button type="button" class="btn btn--secondary btn--small" id="btn-load-expand">変更する</button>
      </div>
    </section>

    <!-- 編集エリア -->
    <section class="panel" id="section-editor" hidden>
      <h2 class="panel__title">発言を編集する</h2>

      <p class="filter-note" id="filter-note" hidden>※ 絞り込み中は並べ替え・追加ができません。「すべて表示」に戻すとご利用いただけます。</p>

      <p class="msg-count" id="msg-count"></p>
      <p class="panel__desc">発言をタップして選択すると、画面下部に操作ボタンが表示されます。</p>

      <div id="message-list" class="message-list"></div>
    </section>

  </main>

</div>

<!-- 発言 追加・編集パネル（オーバーレイ） -->
<div class="overlay" id="msg-overlay" hidden>
  <div class="overlay__backdrop" id="msg-overlay-backdrop"></div>
  <div class="overlay__sheet" role="dialog" aria-modal="true" aria-labelledby="msg-form-title">
    <h3 id="msg-form-title">発言を編集</h3>

    <form id="msg-form">
      <label class="field">
        <span class="field__label">タブ</span>
        <select id="field-tab-select">
          <option value="__new__">＋ 新しいタブを追加する</option>
        </select>
      </label>

      <div id="new-tab-block" class="new-speaker-block" hidden>
        <label class="field">
          <span class="field__label">新しいタブ名</span>
          <input type="text" id="field-tab-name" placeholder="[main]" />
        </label>
      </div>

      <label class="field">
        <span class="field__label">発言者</span>
        <select id="field-speaker-select">
          <option value="__new__">＋ 新しい発言者を登録する</option>
        </select>
      </label>

      <div id="new-speaker-block" class="new-speaker-block" hidden>
        <label class="field">
          <span class="field__label">新しい発言者名</span>
          <input type="text" id="field-speaker-name" placeholder="発言者名を入力" />
        </label>
        <div class="field">
          <span class="field__label">色を選ぶ</span>
          <div class="color-swatches" id="color-swatches"></div>
        </div>
        <label class="field">
          <span class="field__label">カラーコード（任意）</span>
          <input type="text" id="field-speaker-color" placeholder="#03a9f4" />
        </label>
      </div>

      <label class="field">
        <span class="field__label">本文</span>
        <textarea id="field-text" rows="5" placeholder="発言の本文" required></textarea>
      </label>

      <label class="field field--checkbox">
        <input type="checkbox" id="field-dice" />
        <span class="field__label">ダイスロールとして扱う</span>
      </label>

      <div class="overlay__actions">
        <button type="button" class="btn btn--secondary btn--block" id="btn-cancel-msg">キャンセル</button>
        <button type="submit" class="btn btn--primary btn--block" id="btn-submit-msg">保存する</button>
      </div>
    </form>
  </div>
</div>

<!-- 発言者カラー管理パネル（オーバーレイ） -->
<div class="overlay" id="speaker-color-overlay" hidden>
  <div class="overlay__backdrop" id="speaker-color-overlay-backdrop"></div>
  <div class="overlay__sheet" role="dialog" aria-modal="true" aria-labelledby="speaker-color-title">
    <h3 id="speaker-color-title">発言者の色を管理する</h3>
    <p class="panel__desc">発言者を選ぶと、その発言者のすべての発言の色をまとめて変更します。</p>
    <div id="speaker-color-list" class="speaker-color-list"></div>
    <button type="button" class="btn btn--secondary btn--block" id="btn-close-speaker-colors">閉じる</button>
  </div>
</div>

<!-- 選択中の発言に対する操作バー（画面下部に固定） -->
<div class="bottom-bar" id="bottom-bar" hidden>
  <div class="bottom-bar__row1" id="bottom-bar-row1">
    <span class="bottom-bar__label" id="bottom-bar-label"></span>
    <button type="button" class="bottom-bar__icon-btn" id="btn-bottom-bar-toggle" aria-label="操作パネルを開閉する">▾</button>
    <button type="button" class="bottom-bar__icon-btn" id="btn-bottom-bar-close" aria-label="選択を解除する">×</button>
  </div>
  <div class="action-grid" id="bottom-bar-actions">
    <button type="button" class="btn btn--secondary btn--small" id="bar-action-up">↑ 上へ</button>
    <button type="button" class="btn btn--secondary btn--small" id="bar-action-down">↓ 下へ</button>
    <button type="button" class="btn btn--secondary btn--small" id="bar-action-edit">編集</button>
    <button type="button" class="btn btn--danger btn--small" id="bar-action-delete">削除</button>
    <button type="button" class="btn btn--secondary btn--small btn--full" id="bar-action-insert-below">＋ この下に発言を追加</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
